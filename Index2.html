<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeno AI GOD +2000</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  body { background:#ffffff; color:#202124; display:flex; flex-direction:column; height:100vh; }
.header { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; border-bottom:1px solid #e0e0e0; background:#fff; }
.logo-left { font-size:20px; font-weight:700; color:#1a73e8; }
.logo-right { font-size:12px; color:#5f6368; }
.key-section { padding:12px 20px; background:#f8f9fa; border-bottom:1px solid #e0e0e0; display:flex; gap:10px; }
.key-input { flex:1; padding:10px 14px; border:1px solid #dadce0; border-radius:8px; }
.save-btn { padding:10px 18px; background:#1a73e8; color:white; border:none; border-radius:8px; cursor:pointer; }
.chat-area { flex:1; overflow-y:auto; padding:20px; background:#fff; }
.msg { max-width:75%; padding:12px 16px; border-radius:18px; margin-bottom:12px; line-height:1.5; }
.user { background:#e8f0fe; margin-left:auto; border-bottom-right-radius:4px; }
.ai { background:#f1f3f4; margin-right:auto; border-bottom-left-radius:4px; }
.footer { display:flex; padding:12px 20px; border-top:1px solid #e0e0e0; gap:10px; background:#fff; }
.input-box { flex:1; border:1px solid #dadce0; border-radius:24px; padding:12px 18px; font-size:15px; }
.btn { background:#1a73e8; border:none; border-radius:50%; width:48px; height:48px; color:white; font-size:22px; cursor:pointer; }
</style>
</head>
<body>
<div class="header">
  <div class="logo-left">Zeno AI</div>
  <div class="logo-right">Rajputana Event Planner</div>
</div>
<div class="key-section">
  <input type="password" id="apiKey" class="key-input" placeholder="Paste your Gemini API Key here">
  <button class="save-btn" onclick="saveKey()">Save Key</button>
</div>
<div class="chat-area" id="chat">
  <div class="msg ai">Welcome to Zeno AI GOD +2000<br>Apna Gemini API Key save karein.</div>
</div>
<div class="footer">
  <input type="text" id="userInput" class="input-box" placeholder="Ask Zeno anything..." onkeypress="if(event.key==='Enter') sendMessage()">
  <button class="btn" onclick="startVoice()">🎤</button>
  <button class="btn" onclick="sendMessage()">➤</button>
</div>

<script>
function saveKey() {
  localStorage.setItem('geminiKey', document.getElementById('apiKey').value);
  alert('Key Saved Successfully!');
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const message = input.value.trim();
  const key = localStorage.getItem('geminiKey');
  if(!message) return;
  if(!key) { alert('Pehle API Key save karein'); return; }
  addMsg(message, 'user');
  input.value = '';
  getAIResponse(message, key);
}

async function getAIResponse(message, key) {
  const chat = document.getElementById('chat');
  const loading = document.createElement('div');
  loading.className = 'msg ai';
  loading.innerText = 'Zeno soch raha hai...';
  chat.appendChild(loading);
  chat.scrollTop = chat.scrollHeight;
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({contents: [{parts: [{text: message}]}]})
    });
    const data = await res.json();
    loading.remove();
    addMsg(data.candidates[0].content.parts[0].text, 'ai');
  } catch(e) {
    loading.remove();
    addMsg('Error: Key galat hai ya internet slow hai', 'ai');
  }
}

function addMsg(text, sender) {
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  div.innerText = text;
  document.getElementById('chat').appendChild(div);
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function startVoice() {
  alert('Voice feature agle update me aayega. Abhi type karke bhejein.');
}
</script>
</body>
</html>
